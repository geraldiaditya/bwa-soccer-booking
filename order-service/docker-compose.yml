name: base-docker # change this to your app name
services:
  order-service: # change this to your service name
    container_name: order-service # change this to your service name
    # image: ralsaditya/order-service:1 # change this to your image name
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8004:8004" # change this to your port
    env_file:
      - .env