basePath: /api/v1
definitions:
  dto.FieldScheduleRequest:
    properties:
      date:
        type: string
      fieldId:
        type: string
      timeIDs:
        items:
          type: string
        type: array
    required:
    - date
    - fieldId
    - timeIDs
    type: object
  dto.GenerateFieldScheduleForOneMonthRequest:
    properties:
      fieldId:
        type: string
    required:
    - fieldId
    type: object
  dto.TimeRequest:
    properties:
      endTime:
        type: string
      startTime:
        type: string
    required:
    - endTime
    - startTime
    type: object
  dto.UpdateFieldScheduleRequest:
    properties:
      date:
        type: string
      timeID:
        type: string
    required:
    - date
    - timeID
    type: object
  dto.UpdateStatusFieldScheduleRequest:
    properties:
      fieldScheduleIDs:
        items:
          type: string
        type: array
    required:
    - fieldScheduleIDs
    type: object
  response.Response:
    properties:
      data: {}
      message:
        type: string
      requestId:
        type: string
      status:
        type: string
      token:
        type: string
    type: object
host: localhost:8002
info:
  contact: {}
  description: Microservice for managing soccer fields and schedules.
  title: Field Service API
  version: "1.0"
paths:
  /field-schedules:
    get:
      consumes:
      - application/json
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        required: true
        type: integer
      - default: 10
        description: Limit per page
        in: query
        name: limit
        required: true
        type: integer
      - description: Sort column
        in: query
        name: sortColumn
        type: string
      - description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sortOrder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get all field schedules with pagination
      tags:
      - FieldSchedule
    post:
      consumes:
      - application/json
      parameters:
      - description: Schedule Request
        in: body
        name: body
        required: true
        schema:
