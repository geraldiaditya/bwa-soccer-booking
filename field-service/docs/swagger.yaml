          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Delete a field schedule
      tags:
      - FieldSchedule
    get:
      consumes:
      - application/json
      parameters:
      - description: Schedule UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
